<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <link rel="stylesheet" href="/css/signup.css" th:href="@{/css/signup.css}">
</head>

<body class="signup-page page-signup">

<div class="signup-shell">
    <section class="auth-hero">
        <div class="ambient ambient-a"></div>
        <div class="ambient ambient-b"></div>

        <div class="signup-stage">

            <div class="signup-copy">
                <div class="image-overlay">
                    <img th:src="@{/images/loginImage.png}"
                         alt="Signup Image"
                         class="signup-image">
                </div>
            </div>

            <div class="signup-card">
                <form class="signupForm" method="POST" th:action="@{/signup}" th:object="${signupForm}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="form-group">
                        <label for="name">Name</label>
                        <div class="input-wrap">
                            <span class="field-icon">👤</span>
                            <input class="home_input"
                                   type="text"
                                   id="name"
                                   th:field="*{name}"
                                   placeholder="Adınızı girin">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-wrap">
                            <span class="field-icon">@</span>
                            <input class="home_input"
                                   type="email"
                                   id="email"
                                   th:field="*{mail}"
                                   placeholder="E-mail adresinizi girin">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrap">
                            <span class="field-icon">●</span>
                            <input class="home_input"
                                   type="password"
                                   id="password"
                                   th:field="*{password}"
                                   placeholder="Şifrenizi girin">
                        </div>
                    </div>

                    <button class="signup-btn" type="submit">Signup</button>

                    <p class="login-link">
                        Zaten hesabınız var mı?
                        <a th:href="@{/login}">Login</a>
                    </p>
                </form>
            </div>

        </div>
    </section>
</div>

</body>
</html>
