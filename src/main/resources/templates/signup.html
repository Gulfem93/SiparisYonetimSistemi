<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="login-page page-login">
<main class="login-shell">
    <div th:replace="~{main :: navbar}"></div>

    <section class="auth-hero">
        <div class="ambient ambient-a"></div>
        <div class="ambient ambient-b"></div>

        <div class="login-stage">
            <aside class="login-copy">
                <p class="eyebrow">Siparis Yonetim Sistemi</p>
                <h1>Operasyonunu tek ekranda yonet.</h1>
                <p class="intro">
                    Yeni hesap olusturarak siparis akisini, stok hareketlerini ve ekip operasyonunu tek panelde takip et.
                </p>
            </aside>

            <section class="login-card" aria-labelledby="signup-title">
                <div class="card-top">
                    <h2 id="signup-title">Yeni Hesap Olustur</h2>
                    <p class="card-subtitle">Bilgilerini gir, hemen kullanmaya basla.</p>
                </div>

                <p th:if="${errorMessage}" th:text="${errorMessage}" class="message message-error"></p>

                <form class="loginForm" th:action="@{/signup}" th:object="${signupForm}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="form-group">
                        <label for="name">Name</label>
                        <div class="input-wrap">
                            <span class="field-icon" aria-hidden="true"></span>
                            <input
                                    class="home_input"
                                    id="name"
                                    type="text"
                                    th:field="*{name}"
                                    autocomplete="name"
                                    placeholder="Ad Soyad"
                                    required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-wrap">
                            <span class="field-icon" aria-hidden="true"></span>
                            <input
                                    class="home_input"
                                    id="email"
                                    type="email"
                                    th:field="*{mail}"
                                    autocomplete="email"
                                    autocapitalize="none"
                                    spellcheck="false"
                                    placeholder="ornek@mail.com"
                                    required>
                        </div>
                        <small th:if="${#fields.hasErrors('mail')}" th:errors="*{mail}" class="field-error"></small>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrap">
                            <span class="field-icon" aria-hidden="true"></span>
                            <input
                                    class="home_input"
                                    id="password"
                                    type="password"
                                    th:field="*{password}"
                                    autocomplete="new-password"
                                    placeholder="********"
                                    required>
                        </div>
                        <small th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="field-error"></small>
                    </div>

                    <button type="submit" class="login-btn">Kayit Ol</button>
                </form>

                <p class="signup-link">
                    Zaten hesabin var mi?
                    <a th:href="@{/login}">Giris yap</a>
                </p>
            </section>
        </div>
    </section>
</main>
</body>
</html>
