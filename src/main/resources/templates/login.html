<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="login-page page-login">
<main class="login-shell">
    <div th:replace="~{main :: navbar(false)}"></div>

    <section class="auth-hero">
        <div class="ambient ambient-a"></div>
        <div class="ambient ambient-b"></div>

        <div class="login-stage">
            <aside class="login-copy">
                <p class="eyebrow">Siparis Yonetim Sistemi</p>
                <h1>Operasyonunu tek ekranda yonet.</h1>
                <p class="intro">
                    Tum siparis akisini, stok hareketlerini ve ekip operasyonunu tek panelde hizlica takip et.
                </p>
            </aside>

            <section class="login-card" aria-labelledby="login-title">
                <div class="card-top">
                    <h2 id="login-title">Hesabina Giris Yap</h2>
                    <p class="card-subtitle">Devam etmek icin bilgilerini gir.</p>
                </div>

                <p th:if="${errorMessage}" th:text="${errorMessage}" class="message message-error"></p>
                <p th:if="${successMessage}" th:text="${successMessage}" class="message message-success"></p>

                <form class="loginForm" th:action="@{/login}" th:object="${loginForm}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="form-group">
                        <label for="username">Email / Username</label>
                        <div class="input-wrap">
                            <span class="field-icon" aria-hidden="true"></span>
                            <input
                                    class="home_input"
                                    id="username"
                                    type="text"
                                    th:field="*{username}"
                                    autocomplete="username"
                                    autocapitalize="none"
                                    spellcheck="false"
                                    placeholder="ornek@mail.com veya kullanici adi"
                                    required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrap">
                            <span class="field-icon" aria-hidden="true"></span>
                            <input
                                    class="home_input"
                                    id="password"
                                    type="password"
                                    th:field="*{password}"
                                    autocomplete="current-password"
                                    placeholder="********"
                                    required>
                        </div>
                    </div>

                    <button type="submit" class="login-btn">Giris Yap</button>
                </form>

                <p class="signup-link">
                    Hesabin yok mu?
                    <a th:href="@{/signup}">Kayit ol</a>
                </p>
            </section>
        </div>
    </section>
</main>
</body>
</html>
