<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="/css/login.css" th:href="@{/css/login.css}">
</head>

<body class="login-page page-login">

<div class="login-shell">
  <section class="auth-hero">
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>

    <div class="login-stage">

      <div class="login-copy">
        <div class="image-overlay">
          <img th:src="@{/images/loginImage.png}"
               alt="Login Image"
               class="login-image">
        </div>
      </div>

      <div class="login-card">
        <form class="loginForm" method="POST" th:action="@{/login}" th:object="${loginForm}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrap">
              <span class="field-icon">@</span>
              <input class="home_input"
                     type="text"
                     id="username"
                     th:field="*{username}"
                     placeholder="Kullanıcı adınızı girin">
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <span class="field-icon">●</span>
              <input class="home_input"
                     type="password"
                     id="password"
                     th:field="*{password}"
                     placeholder="Şifrenizi girin">
            </div>
          </div>

          <button class="login-btn" type="submit">Login</button>

          <p class="signup-link">
            Hesabınız yok mu?
            <a th:href="@{/signup}">Signup</a>
          </p>
        </form>
      </div>

    </div>
  </section>
</div>

</body>
</html>
