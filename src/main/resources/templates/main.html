<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Layout</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:fragment="navbar(showAccountMenu)" class="navbar">
    <div class="navbar-left">
        <h1>Siparis Yonetim Sistemi</h1>
    </div>

    <div class="navbar-right" th:if="${showAccountMenu}">
        <div class="account-name">
            <span th:text="${accountDisplayName != null ? accountDisplayName : 'Hesabim'}">Hesabim</span>
        </div>

        <div class="user-menu">
            <button type="button" class="user-menu-toggle" aria-haspopup="true">
                <span>Hesabim</span>
                <span class="caret" aria-hidden="true">▾</span>
            </button>

            <ul class="dropdown-menu" role="menu" aria-label="User Menu">
                <li><a class="dropdown-item" th:href="@{/me/profile}">Profile</a></li>
                <li class="menu-divider" role="separator"></li>
                <li>
                    <a class="dropdown-item text-danger" th:href="@{/logout}">Log out</a>
                </li>
            </ul>
        </div>
    </div>
</div>

</body>
</html>
