<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Home</title>
  <link rel="stylesheet" href="/css/main.css" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="~{logout/main :: main}"></div>

<section class="home-content">
  <div class="welcome-card">
    <h1>Welcome</h1>
    <p th:if="${name != null}">
      Hoş geldin, <strong th:text="${name}"></strong>
    </p>
    <p th:if="${name == null}">
      Sipariş yönetim sistemine hoş geldiniz.
    </p>
  </div>
</section>

</body>
</html>
