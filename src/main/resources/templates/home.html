<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
<div>
  <h1>Welcome</h1>
  <h2 th:if="${userName != null}" th:text="${userName}"></h2>

  <form th:if="${isAuthenticated}" th:action="@{/logout}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <button type="submit">Logout</button>
  </form>
</div>
</body>
</html>
